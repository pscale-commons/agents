<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERMITCRAB — Monitor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐚</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 1rem;
      font-size: 13px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 1rem;
    }
    header h1 { color: #5eead4; font-size: 1rem; }
    header .status { color: #94a3b8; font-size: 0.85rem; }
    .refresh-btn {
      margin-left: auto;
      padding: 4px 12px;
      background: #164e63;
      color: #94a3b8;
      border: 1px solid #1e293b;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .refresh-btn:hover { background: #155e75; color: #e2e8f0; }
    .auto-label { color: #64748b; font-size: 0.75rem; margin-left: 0.5rem; }

    .grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 1rem;
      height: calc(100vh - 80px);
    }

    /* Block list sidebar */
    .sidebar {
      border-right: 1px solid #1e293b;
      padding-right: 1rem;
      overflow-y: auto;
    }
    .block-item {
      padding: 6px 8px;
      border-radius: 3px;
      cursor: pointer;
      border-left: 3px solid transparent;
      margin-bottom: 2px;
    }
    .block-item:hover { background: #1e293b; }
    .block-item.active { background: #164e63; border-left-color: #5eead4; }
    .block-name { color: #5eead4; font-weight: bold; }
    .block-p0 { color: #64748b; font-size: 0.8rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .block-size { color: #475569; font-size: 0.7rem; float: right; }

    /* Process state panel */
    .process-bar {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 1rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .process-bar .label { color: #64748b; }
    .process-bar .value { color: #5eead4; }

    /* Main content */
    .main { overflow-y: auto; }
    .content-header {
      color: #5eead4;
      font-size: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 0.75rem;
    }
    .tree-node { margin-left: 1.5rem; }
    .tree-root { margin-left: 0; }
    .node-key { color: #f59e0b; }
    .node-text { color: #cbd5e1; }
    .node-branch { color: #475569; cursor: pointer; }
    .node-branch:hover { color: #94a3b8; }
    .node-collapsed::before { content: '▸ '; color: #475569; }
    .node-expanded::before { content: '▾ '; color: #5eead4; }
    .node-leaf::before { content: '  '; }

    /* History / conversation view */
    .history-entry {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 8px;
    }
    .history-meta { color: #64748b; font-size: 0.8rem; margin-bottom: 4px; }
    .history-text { color: #cbd5e1; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }

    /* Empty state */
    .empty { color: #475569; font-style: italic; padding: 2rem; text-align: center; }

    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 0;
      margin-left: 1rem;
    }
    .view-btn {
      padding: 3px 10px;
      background: #0f172a;
      color: #64748b;
      border: 1px solid #1e293b;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
    }
    .view-btn:first-child { border-radius: 3px 0 0 3px; }
    .view-btn:last-child { border-radius: 0 3px 3px 0; }
    .view-btn.active { background: #164e63; color: #5eead4; }

    /* Context window + conversation views */
    .ctx-view, .conv-view { height: calc(100vh - 80px); overflow-y: auto; padding: 0 0.5rem; }
    .ctx-meta { color: #64748b; font-size: 0.75rem; margin-bottom: 0.75rem; }
    .ctx-section {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 8px;
    }
    .ctx-section-header { color: #f59e0b; font-size: 0.8rem; margin-bottom: 4px; font-weight: bold; }
    .ctx-section-body { color: #cbd5e1; white-space: pre-wrap; word-break: break-word; font-size: 0.85rem; }
    .conv-msg {
      padding: 8px 12px;
      margin-bottom: 6px;
      border-radius: 4px;
      border-left: 3px solid transparent;
    }
    .conv-msg.assistant {
      background: #0f172a;
      border-left-color: #5eead4;
    }
    .conv-msg.user {
      background: #1a1125;
      border-left-color: #a78bfa;
    }
    .conv-msg.system {
      background: #1a1a0f;
      border-left-color: #f59e0b;
    }
    .conv-role {
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .conv-role.assistant { color: #5eead4; }
    .conv-role.user { color: #a78bfa; }
    .conv-role.system { color: #f59e0b; }
    .conv-content {
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.85rem;
    }
    .conv-tool {
      background: #0c1520;
      border: 1px solid #1e293b;
      border-radius: 3px;
      padding: 4px 8px;
      margin: 4px 0;
      font-size: 0.8rem;
    }
    .conv-tool-name { color: #f59e0b; }
    .conv-tool-input { color: #64748b; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
    .conv-tool-result { color: #94a3b8; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
    .conv-empty { color: #475569; font-style: italic; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>🐚 MONITOR</h1>
    <span class="status" id="status">loading...</span>
    <div class="view-toggle">
      <button class="view-btn active" id="btnBlocks" onclick="setView('blocks')">blocks</button>
      <button class="view-btn" id="btnCtx" onclick="setView('context')">context window</button>
      <button class="view-btn" id="btnConv" onclick="setView('conversation')">conversation</button>
    </div>
    <label class="auto-label"><input type="checkbox" id="autoRefresh" checked> auto-refresh 2s</label>
    <button class="refresh-btn" onclick="refresh()">refresh</button>
  </header>

  <div id="processBar" class="process-bar"></div>

  <div class="grid" id="blocksView">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main">
      <div class="empty">Select a block to inspect</div>
    </div>
  </div>

  <div class="ctx-view" id="ctxView" style="display:none"></div>
  <div class="conv-view" id="convView" style="display:none"></div>

  <script>
    const STORE_PREFIX = 'hc:';
    const CONV_KEY = 'hc_conversation';
    let selectedBlock = null;
    let autoTimer = null;
    let currentView = 'blocks';

    function getBlocks() {
      const blocks = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith(STORE_PREFIX)) {
          const name = key.slice(STORE_PREFIX.length);
          try {
            const data = JSON.parse(localStorage.getItem(key));
            const p0 = data?.tree?.['_'] || '';
            const size = localStorage.getItem(key).length;
            blocks.push({ name, data, p0, size });
          } catch (e) {
            blocks.push({ name, data: null, p0: '(parse error)', size: 0 });
          }
        }
      }
      blocks.sort((a, b) => a.name.localeCompare(b.name));
      return blocks;
    }

    function getProcessState(blocks) {
      const wake = blocks.find(b => b.name === 'wake');
      if (!wake || !wake.data?.tree?.['6']?.['7']) return null;
      const proc = wake.data.tree['6']['7'];
      return {
        echo: proc['3'] || '',
        budget: proc['4'] || '',
      };
    }

    function getPurposeSnapshot() {
      // Read from state board if available
      const raw = localStorage.getItem(STORE_PREFIX + 'state_board');
      // state_board isn't a block — it's stored differently. Check.
      // Actually it's stored as a block tool result... let me check kernel
      return null;
    }

    function renderProcessBar(blocks) {
      const el = document.getElementById('processBar');
      const proc = getProcessState(blocks);

      // Count history entries
      const history = blocks.find(b => b.name === 'history');
      let historyCount = 0;
      if (history?.data?.tree) {
        for (const k of Object.keys(history.data.tree)) {
          if (k !== '_' && k !== 'tuning') historyCount++;
        }
      }

      // Purpose pscale-0
      const purpose = blocks.find(b => b.name === 'purpose');
      const purposeP0 = purpose?.data?.tree?.['_'] || '(empty)';

      // Stash count
      const stash = blocks.find(b => b.name === 'stash');
      let stashCount = 0;
      if (stash?.data?.tree) {
        for (const k of Object.keys(stash.data.tree)) {
          if (k !== '_' && k !== 'tuning') stashCount++;
        }
      }

      let html = '';
      if (proc) {
        html += `<div><span class="label">process: </span><span class="value">${escHtml(proc.echo)}</span></div>`;
      }
      html += `<div><span class="label">history: </span><span class="value">${historyCount} entries</span></div>`;
      html += `<div><span class="label">stash: </span><span class="value">${stashCount} entries</span></div>`;
      html += `<div><span class="label">purpose-0: </span><span class="value">${escHtml(truncate(purposeP0, 80))}</span></div>`;
      el.innerHTML = html;
    }

    function renderSidebar(blocks) {
      const el = document.getElementById('sidebar');
      el.innerHTML = blocks.map(b => {
        const active = b.name === selectedBlock ? ' active' : '';
        const sizeKb = (b.size / 1024).toFixed(1);
        return `<div class="block-item${active}" onclick="selectBlock('${b.name}')">
          <span class="block-name">${b.name}</span>
          <span class="block-size">${sizeKb}k</span>
          <span class="block-p0">${escHtml(truncate(b.p0, 60))}</span>
        </div>`;
      }).join('');
    }

    function renderBlock(block) {
      const el = document.getElementById('main');
      if (!block || !block.data) {
        el.innerHTML = '<div class="empty">Block not found or empty</div>';
        return;
      }

      if (block.name === 'history') {
        renderHistory(block);
        return;
      }

      el.innerHTML = `<div class="content-header">${block.name}</div>
        <div class="tree-root">${renderTree(block.data.tree, '')}</div>`;
    }

    function renderTree(node, path, depth = 0) {
      if (typeof node === 'string') {
        return `<div class="node-text" style="margin-left:${depth * 1.5}rem">${escHtml(node)}</div>`;
      }
      if (typeof node !== 'object' || node === null) return '';

      let html = '';
      // _ text first
      if (node['_']) {
        html += `<div style="margin-left:${depth * 1.5}rem">`;
        if (path) html += `<span class="node-key">${path}</span> `;
        html += `<span class="node-text">${escHtml(node['_'])}</span></div>`;
      }
      // Children (digits 1-9, then others)
      const keys = Object.keys(node).filter(k => k !== '_' && k !== 'tuning').sort((a, b) => {
        const na = Number(a), nb = Number(b);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return a.localeCompare(b);
      });
      for (const k of keys) {
        const childPath = path ? `${path}.${k}` : k;
        if (typeof node[k] === 'string') {
          html += `<div style="margin-left:${(depth + 1) * 1.5}rem">`;
          html += `<span class="node-key">${childPath}</span> `;
          html += `<span class="node-text">${escHtml(node[k])}</span></div>`;
        } else {
          html += renderTree(node[k], childPath, depth + 1);
        }
      }
      return html;
    }

    function renderHistory(block) {
      const el = document.getElementById('main');
      const tree = block.data?.tree || {};
      const entries = [];

      function collectEntries(node, path) {
        if (typeof node === 'string' && path !== '_' && path !== 'tuning') {
          entries.push({ path, text: node });
        } else if (typeof node === 'object' && node !== null) {
          for (const k of Object.keys(node)) {
            if (k === '_' || k === 'tuning') continue;
            collectEntries(node[k], path ? `${path}.${k}` : k);
          }
        }
      }
      collectEntries(tree, '');

      // Reverse so newest first
      entries.reverse();

      let html = `<div class="content-header">history (${entries.length} entries, newest first)</div>`;
      for (const entry of entries) {
        const meta = entry.text.match(/^\[([^\]]+)\]/);
        const metaStr = meta ? meta[1] : '';
        const text = meta ? entry.text.slice(meta[0].length).trim() : entry.text;
        html += `<div class="history-entry">
          <div class="history-meta">${entry.path} — ${escHtml(metaStr)}</div>
          <div class="history-text">${escHtml(text)}</div>
        </div>`;
      }
      if (entries.length === 0) {
        html += '<div class="empty">No history entries yet</div>';
      }
      el.innerHTML = html;
    }

    function selectBlock(name) {
      selectedBlock = name;
      refresh();
    }

    function refresh() {
      const blocks = getBlocks();
      const count = blocks.length;
      const totalSize = blocks.reduce((s, b) => s + b.size, 0);

      const convMessages = getConversation();
      const convInfo = convMessages.length > 0 ? ` | ${convMessages.length} messages` : '';
      document.getElementById('status').textContent =
        `${count} blocks | ${(totalSize / 1024).toFixed(1)}kb total${convInfo} | ${new Date().toLocaleTimeString()}`;

      renderProcessBar(blocks);

      if (currentView === 'blocks') {
        renderSidebar(blocks);
        if (selectedBlock) {
          const block = blocks.find(b => b.name === selectedBlock);
          renderBlock(block);
        }
      } else if (currentView === 'context') {
        renderContextWindow();
      } else {
        renderConversation();
      }
    }

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function truncate(s, n) {
      if (!s || s.length <= n) return s;
      return s.slice(0, n) + '...';
    }

    function setView(view) {
      currentView = view;
      document.getElementById('btnBlocks').classList.toggle('active', view === 'blocks');
      document.getElementById('btnCtx').classList.toggle('active', view === 'context');
      document.getElementById('btnConv').classList.toggle('active', view === 'conversation');
      document.getElementById('blocksView').style.display = view === 'blocks' ? '' : 'none';
      document.getElementById('ctxView').style.display = view === 'context' ? '' : 'none';
      document.getElementById('convView').style.display = view === 'conversation' ? '' : 'none';
      refresh();
    }

    function getContextWindow() {
      try {
        const raw = localStorage.getItem(STORE_PREFIX + '_context_window');
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function renderContextWindow() {
      const el = document.getElementById('ctxView');
      const ctx = getContextWindow();
      if (!ctx || !ctx.text) {
        el.innerHTML = '<div class="conv-empty">No context window yet. Boot a hermitcrab in another tab — the kernel persists the compiled system prompt.</div>';
        return;
      }

      const age = ctx.ts ? Math.round((Date.now() - ctx.ts) / 1000) : null;
      const ageStr = age !== null ? (age < 60 ? `${age}s ago` : age < 3600 ? `${Math.round(age/60)}m ago` : `${Math.round(age/3600)}h ago`) : '';
      const sizeKb = (ctx.text.length / 1024).toFixed(1);

      // Split on double newlines — each section is a BSP extraction result
      const sections = ctx.text.split(/\n\n/).filter(s => s.trim());

      let html = `<div class="ctx-meta">Compiled ${ageStr} | ${sizeKb}kb | ${sections.length} sections</div>`;

      for (const section of sections) {
        // Check if section starts with a [block_name] or [orientation] header
        const headerMatch = section.match(/^\[([^\]]+)\]/);
        if (headerMatch) {
          const header = headerMatch[1];
          const body = section.slice(headerMatch[0].length).trim();
          html += `<div class="ctx-section">
            <div class="ctx-section-header">[${escHtml(header)}]</div>
            <div class="ctx-section-body">${escHtml(body)}</div>
          </div>`;
        } else {
          html += `<div class="ctx-section">
            <div class="ctx-section-body">${escHtml(section)}</div>
          </div>`;
        }
      }

      el.innerHTML = html;
    }

    function getConversation() {
      try {
        const raw = localStorage.getItem(CONV_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    }

    function renderConversation() {
      const el = document.getElementById('convView');
      const messages = getConversation();
      if (messages.length === 0) {
        el.innerHTML = '<div class="conv-empty">No conversation yet. Boot a hermitcrab in another tab.</div>';
        return;
      }

      let html = '';
      for (const msg of messages) {
        const role = msg.role || 'unknown';
        const content = msg.content;

        if (typeof content === 'string') {
          html += `<div class="conv-msg ${role}">
            <div class="conv-role ${role}">${role}</div>
            <div class="conv-content">${escHtml(content)}</div>
          </div>`;
        } else if (Array.isArray(content)) {
          html += `<div class="conv-msg ${role}">
            <div class="conv-role ${role}">${role}</div>`;
          for (const block of content) {
            if (block.type === 'text') {
              html += `<div class="conv-content">${escHtml(block.text || '')}</div>`;
            } else if (block.type === 'tool_use') {
              const inputStr = JSON.stringify(block.input, null, 2);
              html += `<div class="conv-tool">
                <span class="conv-tool-name">${escHtml(block.name)}</span>
                <div class="conv-tool-input">${escHtml(truncate(inputStr, 500))}</div>
              </div>`;
            } else if (block.type === 'tool_result') {
              const resultStr = typeof block.content === 'string' ? block.content : JSON.stringify(block.content);
              html += `<div class="conv-tool">
                <span class="conv-tool-name">result</span>
                <div class="conv-tool-result">${escHtml(truncate(resultStr, 800))}</div>
              </div>`;
            }
          }
          html += `</div>`;
        }
      }
      el.innerHTML = html;
    }

    // Auto-refresh
    function startAutoRefresh() {
      stopAutoRefresh();
      if (document.getElementById('autoRefresh').checked) {
        autoTimer = setInterval(refresh, 2000);
      }
    }
    function stopAutoRefresh() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }
    document.getElementById('autoRefresh').addEventListener('change', startAutoRefresh);

    // Init
    refresh();
    startAutoRefresh();
  </script>
</body>
</html>
